name: .NET CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔹 2. Setup .NET 8
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 🔹 3. Restore dependencies
    - name: Restore dependencies
      run: dotnet restore CampusTouch.sln

    # 🔹 4. Build solution
    - name: Build project
      run: dotnet build CampusTouch.sln --configuration Release --no-restore

    # 🔹 5. Run unit tests 🔥
    - name: Run Tests
      run: dotnet test CampusTouch.sln --configuration Release --no-build --verbosity normal